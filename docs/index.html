<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Hello World!</title>
    <link rel="stylesheet" href="/venta/app.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  </head>
  <body>
    <div class="gradient stack1"></div>
    <div class="gradient stack2"></div>
    <div class="gradient stack3"></div>
    <section id="loader">
      <div class="loading">
        <img class="spinner" src="https://cdn.shopify.com/s/files/1/0560/7466/6159/files/spinner.gif?v=1646281504">
      </div>
    </section>
    <section id="main">
      <div class="site-logo-placeholder">
        <h1 class="site-logo">Stacked Gradient Loop</h1>
      </div>
    </section>
    <script type="text/javascript">
      $(document).ready(()=>{
        setTimeout(()=>{
          $('#loader').html('');
          $('#main').fadeIn();
        },1000);
      });
    </script>
    <style media="screen">
      @keyframes gradient {
        0% {
          background-position: 0% 50%; /* top center */
        }
        50% {
          background-position: 100% 50%; /* bottom center */
        }
        100% {
          background-position: 0% 50%; /* top center */
        }
      }
    </style>
  </body>
</html>
